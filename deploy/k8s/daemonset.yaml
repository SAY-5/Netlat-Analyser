---
apiVersion: v1
kind: Namespace
metadata:
  name: netlat
  labels:
    app.kubernetes.io/name: netlat
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netlat
  namespace: netlat
  labels:
    app.kubernetes.io/name: netlat
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: netlat
  labels:
    app.kubernetes.io/name: netlat
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: netlat
  labels:
    app.kubernetes.io/name: netlat
subjects:
  - kind: ServiceAccount
    name: netlat
    namespace: netlat
roleRef:
  kind: ClusterRole
  name: netlat
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netlat
  namespace: netlat
  labels:
    app.kubernetes.io/name: netlat
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: netlat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netlat
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: netlat
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 30
      tolerations:
        - operator: Exists
      containers:
        - name: netlat
          image: netlat:latest
          imagePullPolicy: IfNotPresent
          args:
            - "capture"
            - "--interface=any"
            - "--duration=3600"
            - "--output-dir=/captures"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: capture-data
              mountPath: /captures
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: capture-data
          hostPath:
            path: /var/lib/netlat/captures
            type: DirectoryOrCreate
